<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="load">    
        <div class="login">
          <div class="title-login">
            <h3>Bem vindo ao FreelanceBoard</h3>
          </div>
          <div class="input-login">
            <input type="text" placeholder="Login" id="inputLogin" />
            <input type="password" placeholder="Senha" id="inputSenha" />
          </div>
          <div class="btn-login">
            <button type="button" id="btnLogin">Entrar</button>
          </div>
        </div>
      </div>
    <script src="script.js"></script>
</body>
</html>
